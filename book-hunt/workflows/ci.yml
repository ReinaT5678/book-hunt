name: CI

on: 
  push: 
    branches: [main]

jobs: 
  test: 
    runs-on: ubuntu-latest 

    services: 
      postgres: 
        image: postgres:16
        env: 
          POSTGRES_USER: bookhunt
          POSTGRES_PASSWORD: bookhunt_password
          POSTGRES_DB: bookhunt
        ports: 
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U bookhunt -d bookhunt_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        
      env: 
        FLASK_SECRET_KEY: test_secret_key
        TEST_DATABASE_URL: postgresql+psycopg://bookhunt:bookhunt_password@localhost:5432/bookhunt_test

      steps: 
        - name: Checkout code 
          uses: actions/checkout@v4

        - name: Set up Python
          uses: actions/setup-python@v5
          with: 
            python-version: 3.12

        - name: Install dependencies
          run: |
            python -m pip install --upgrade pip
            pip install -r book-hunt/requirements.txt
            pip install pytest 
      
        - name: Run tests
          run: pytest test.py