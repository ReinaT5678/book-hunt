{% extends "base.html" %}
{% block content %}
    <body>
        {% if email %}
        <div class="show-user">
            <h1>Welcome, {{ email }}</h1>
            <p>Your email is: {{ email }}</p>
        </div>
        {% else %}
        <div class="show-user">
            <h1>Please log in to see your profile.</h1>
        </div>
        {% endif %}
    </body> 
{% endblock %}
