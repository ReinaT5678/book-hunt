name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: bookhunt
          POSTGRES_PASSWORD: bookhunt_password
          POSTGRES_DB: bookhunt_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U bookhunt -d bookhunt_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      FLASK_SECRET_KEY: test-secret-key
      TEST_DATABASE_URL: postgresql+psycopg://bookhunt:bookhunt_password@localhost:5432/bookhunt_test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        working-directory: book-hunt
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest

      - name: Run tests
        working-directory: book-hunt
        run: pytest test.py